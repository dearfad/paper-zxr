# MCF-7 / MDA-MB-231 3D类器官图像质控配置

# ==================== 质控参数 ====================
quality_control:
  laplacian_variance_threshold: 50.0
  brightness:
    mean_min: 50.0
    mean_max: 200.0
    std_min: 20.0
  scratch_detection:
    enabled: true
    line_threshold: 100
    max_allowed_lines: 5

# ==================== 预处理参数 ====================
preprocessing:
  target_size: [336, 336]
  center_crop_ratio: 0.8
  clahe:
    clip_limit: 2.0
    tile_grid_size: [8, 8]
  denoising:
    gaussian_sigma: 0.5
    median_kernel_size: 3

# ==================== 细胞系特定参数 ====================
cell_line_specific:
  MCF7:
    laplacian_threshold: 55.0
    min_circularity: 0.8
    expected_diameter_range: [50, 400]

  MDA231:
    laplacian_threshold: 45.0
    min_circularity: 0.4
    expected_diameter_range: [30, 500]

# ==================== 采集参数 ====================
acquisition:
  timepoints: [0, 6, 12, 24, 48, 72, 96, 168, 336]
  views_per_well: 5
  format: "TIFF"
  naming_convention: "{CellLine}_{SampleID}_{Timepoint}_{ViewID}.tif"

# ==================== 数据集划分 ====================
dataset_split:
  train_ratio: 0.6
  val_ratio: 0.2
  test_ratio: 0.2
  stratify_by: ["cell_line", "outcome"]
